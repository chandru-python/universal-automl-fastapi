<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<title>Prediction - AutoML</title>

<style>

body{
    font-family:Arial;
    background:linear-gradient(135deg,#0f2027,#203a43,#2c5364);
    color:white;
    text-align:center;
}

.navbar{
    background:black;
    padding:15px;
}

.navbar a{
    color:white;
    margin:15px;
    text-decoration:none;
}

.container{

    background:rgba(255,255,255,0.1);
    width:400px;
    margin:50px auto;
    padding:20px;
    border-radius:10px;
}

input{

    width:80%;
    padding:10px;
    margin:10px;
}

button{

    padding:10px 20px;
    background:#00d4ff;
    border:none;
    cursor:pointer;
}

.result{

    margin-top:20px;
    background:rgba(0,255,150,0.2);
    padding:15px;
    border-radius:8px;
}

.error{

    background:red;
    padding:10px;
}

</style>

</head>

<body>


<div class="navbar">

<a href="/">Home</a>
<a href="/upload">Upload</a>
<a href="/predict">Predict</a>
<a href="/about">About</a>

</div>


<div class="container">

<h2>Prediction</h2>

{% if error %}

<div class="error">
{{ error }}
</div>

{% endif %}


<form method="post">

{% for feature in features %}

<label>{{ feature }}</label>

<br>

<input type="number" step="any" name="{{ feature }}" required>

<br>

{% endfor %}

<button type="submit">

Predict

</button>

</form>


{% if result is defined %}

<div class="result">

<h3>Prediction Result:</h3>

<h2>{{ result }}</h2>

</div>

{% endif %}


</div>

</body>
</html>
