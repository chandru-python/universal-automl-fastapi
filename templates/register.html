<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Register - AutoML System</title>

<style>

/* BODY */

body{
    margin:0;
    font-family:Arial, Helvetica, sans-serif;
    background:linear-gradient(135deg,#0f2027,#203a43,#2c5364);
    color:white;
}

/* NAVBAR */

.navbar{
    background:black;
    padding:15px;
    display:flex;
    justify-content:space-between;
}

.navbar h2{
    margin:0;
}

.navbar a{
    color:white;
    text-decoration:none;
    margin-left:20px;
}

.navbar a:hover{
    color:#00d4ff;
}


/* REGISTER CARD */

.container{

    width:350px;
    margin:100px auto;
    background:rgba(255,255,255,0.1);
    padding:30px;
    border-radius:10px;
    backdrop-filter:blur(10px);
    box-shadow:0 0 20px rgba(0,0,0,0.5);
}

/* TITLE */

h2{
    margin-bottom:20px;
}

/* INPUT */

input{

    width:90%;
    padding:10px;
    margin-top:10px;
    border-radius:5px;
    border:none;
}

/* BUTTON */

button{

    width:95%;
    padding:12px;
    margin-top:20px;
    border:none;
    border-radius:5px;
    background:#28a745;
    color:white;
    font-weight:bold;
    cursor:pointer;
}

button:hover{
    background:#1e7e34;
}

/* LOGIN LINK */

.login{

    margin-top:15px;
}

.login a{

    color:#00d4ff;
    text-decoration:none;
}

.login a:hover{
    text-decoration:underline;
}

/* FOOTER */

.footer{

    text-align:center;
    margin-top:30px;
    color:gray;
}

</style>

</head>

<body>


<!-- NAVBAR -->

<div class="navbar">

<h2>⚡ AutoML System</h2>

<div>

<a href="/">Home</a>
<a href="/upload">Upload</a>
<a href="/predict">Predict</a>
<a href="/about">About</a>
<a href="/login">Login</a>

</div>

</div>


<!-- REGISTER FORM -->

<div class="container">

<h2>Create Account</h2>

<form method="post">

<label>Username</label>

<br>

<input type="text" name="username" required>

<br>

<label>Password</label>

<br>

<input type="password" name="password" required>

<br>

<button type="submit">

Register

</button>

</form>


<div class="login">

Already have account?  
<a href="/login">Login here</a>

</div>

</div>


<div class="footer">

© 2026 AutoML System

</div>


</body>
</html>
